<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="إتقان - منصة متكاملة لتعليم القرآن الكريم، تربط بين الطلاب والمعلمات لتسهيل الحفظ والتجويد والتفسير">
    <meta name="theme-color" content="#059669">
    
    <title>إتقان - منصة تعليم القرآن الكريم</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Loading styles -->
    <style>
      .loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f8fafc;
        z-index: 9999;
      }
      .loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        font-family: 'Tajawal', sans-serif;
        color: #64748b;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e2e8f0;
        border-top-color: #10b981;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
</head>
<body>
    <div id="root">
      <!-- Loading indicator shown before React loads -->
      <div class="loading-screen">
        <div class="loading-content">
          <div class="loading-spinner"></div>
          <span>جاري التحميل...</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
